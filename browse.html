<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Browse — Parasite Club USA</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ffffff;--ink:#0c0c0e;--soft:#f5f4ef;--soft2:#ecebe4;--muted:#6c6c74;--line:#e7e5dd;
  --lime:#C2F500;--limeink:#1d2400;--yellow:#FFE600;--heart:#ff3b6b;
  --sans:'Inter',system-ui,sans-serif;--disp:'Anton',sans-serif;--wrap:1180px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.5;padding-bottom:88px}
a{color:inherit;text-decoration:none}img{display:block;max-width:100%}
.wrap{max-width:var(--wrap);margin:0 auto;padding:0 22px}
.nav{position:sticky;top:0;z-index:50;background:#ffffffe8;backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.nav .row{display:flex;align-items:center;justify-content:space-between;height:60px}
.brand{font-family:var(--disp);font-size:18px}.brand .dot{color:#9a9a9a}
.navbtn{background:var(--ink);color:#fff;font-weight:600;font-size:13px;padding:9px 15px;border-radius:30px;display:inline-flex;gap:6px;align-items:center}
.bagct{background:var(--lime);color:var(--limeink);border-radius:20px;padding:1px 7px;font-weight:700;font-size:12px}
/* house switch */
.houses{display:flex;gap:8px;padding:16px 0 6px;overflow-x:auto;scrollbar-width:none}.houses::-webkit-scrollbar{display:none}
.hpill{flex:none;border:1px solid var(--line);background:#fff;border-radius:30px;padding:9px 16px;font-weight:600;font-size:14px;cursor:pointer;white-space:nowrap}
.hpill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
/* head */
.bhead{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin:10px 0 4px}
.bhead h1{font-family:var(--disp);font-weight:400;font-size:clamp(30px,5vw,46px);text-transform:uppercase;line-height:1}
.bhead .meta{font-size:13px;color:var(--muted);margin-top:4px}
.adbtn{background:var(--lime);color:var(--limeink);border:none;font-weight:700;font-size:14px;padding:12px 18px;border-radius:30px;cursor:pointer;white-space:nowrap}
/* filters */
.filters{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:18px 0 6px}
.cols{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;flex:1}.cols::-webkit-scrollbar{display:none}
.chip{flex:none;border:1px solid var(--line);background:#fff;border-radius:30px;padding:8px 14px;font-weight:600;font-size:13px;cursor:pointer;white-space:nowrap;color:#444}
.chip.on{background:var(--lime);color:var(--limeink);border-color:var(--lime)}
.seg{display:flex;border:1px solid var(--line);border-radius:30px;overflow:hidden;flex:none}
.seg button{border:none;background:#fff;font-family:inherit;font-weight:600;font-size:13px;padding:9px 14px;cursor:pointer;color:#555}
.seg button.on{background:var(--ink);color:#fff}
.colinfo{font-size:13px;color:var(--muted);margin:6px 0 2px;min-height:18px}
/* carousel */
.stage{position:relative;margin:8px 0 0;display:flex;align-items:center;justify-content:center;gap:10px}
.arw{flex:none;width:48px;height:48px;border-radius:50%;border:1px solid var(--line);background:#fff;font-size:20px;cursor:pointer;display:grid;place-items:center;transition:.15s}
.arw:hover{background:var(--soft);transform:scale(1.05)}.arw:active{transform:scale(.95)}
.card{flex:1;max-width:640px;background:var(--soft);border:1px solid var(--line);border-radius:26px;padding:26px;position:relative;overflow:hidden}
.card .imgwrap{height:300px;display:flex;align-items:center;justify-content:center}
.card .imgwrap img{max-height:280px;object-fit:contain;mix-blend-mode:multiply;filter:drop-shadow(0 16px 28px #0002)}
.noimg{font-size:13px;color:#b3b1a6;text-align:center;padding:0 20px}
.card .new{position:absolute;top:20px;left:20px;background:var(--yellow);color:#3a3300;font-weight:800;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:5px 10px;border-radius:20px}
.heart{position:absolute;top:18px;right:18px;width:50px;height:50px;border-radius:50%;background:#fff;border:1px solid var(--line);font-size:22px;cursor:pointer;display:grid;place-items:center;transition:.15s;color:#c9c7be}
.heart:hover{transform:scale(1.08)}.heart.on{color:var(--heart);border-color:var(--heart);background:#fff0f4}
.cinfo{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-top:18px;flex-wrap:wrap}
.cinfo .col{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#9a9a9a}
.cinfo h2{font-family:var(--disp);font-weight:400;font-size:30px;text-transform:uppercase;line-height:1;margin-top:3px}
.cinfo .sub{font-size:12.5px;color:var(--muted);margin-top:3px}
.cinfo .price{text-align:right}
.cinfo .price .pv{font-family:var(--disp);font-size:30px;line-height:1}
.cinfo .price .fin{font-size:11px;color:var(--muted)}
.cactions{display:flex;gap:10px;margin-top:18px}
.cactions .save{flex:1;border:1px solid var(--ink);background:#fff;color:var(--ink);font-weight:700;font-size:14px;padding:14px;border-radius:30px;cursor:pointer}
.cactions .save.on{background:var(--heart);border-color:var(--heart);color:#fff}
.cactions .try{flex:1;background:var(--ink);color:#fff;font-weight:700;font-size:14px;padding:14px;border-radius:30px;cursor:pointer;border:none}
.counter{text-align:center;font-size:13px;color:var(--muted);margin-top:16px}
.counter b{color:var(--ink)}
.prog{height:4px;background:var(--soft2);border-radius:4px;overflow:hidden;max-width:320px;margin:8px auto 0}
.prog i{display:block;height:100%;background:var(--lime);width:0;transition:.3s}
/* mini grid toggle */
.swatchrow{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.swatch{width:42px;height:42px;border-radius:10px;background:#fff;border:2px solid var(--line);overflow:hidden;cursor:pointer;display:grid;place-items:center}
.swatch.on{border-color:var(--lime)}
.swatch img{width:100%;height:100%;object-fit:contain;mix-blend-mode:multiply}
@media(max-width:680px){.arw{position:absolute;top:140px;z-index:5;background:#ffffffd8}.arw.prev{left:0}.arw.next{right:0}.card{max-width:none}.card .imgwrap{height:240px}.card .imgwrap img{max-height:220px}}
/* sticky pick bar */
.pickbar{position:fixed;left:0;right:0;bottom:0;z-index:60;background:#fffffff2;backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:12px 0 calc(12px + env(safe-area-inset-bottom))}
.pickbar .wrap{position:relative}
.pickbar .row{display:flex;align-items:center;gap:14px}
.pickbar .lbl{font-weight:600;font-size:14px}.pickbar .lbl b{color:var(--heart)}
.pickpanel{position:absolute;left:0;right:0;bottom:calc(100% + 12px);background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 -12px 34px -16px #0005;max-height:54vh;overflow:auto;padding:8px;display:none}
.pickpanel.show{display:block}
.pickpanel .ph{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#9a9a9a;padding:8px 10px}
.prow{display:flex;align-items:center;gap:12px;padding:8px 10px;border-top:1px solid var(--line)}
.prow img{width:52px;height:40px;object-fit:contain;mix-blend-mode:multiply;background:var(--soft);border-radius:8px;flex:none}
.prow .pn{flex:1;font-size:13px;font-weight:600}.prow .pn small{display:block;color:var(--muted);font-weight:400}
.prow .rm{border:1px solid var(--line);background:#fff;border-radius:20px;padding:8px 13px;font-size:12px;font-weight:700;cursor:pointer;color:var(--heart);flex:none}
.prow .rm:active{transform:scale(.95)}
.pickbar .mini{display:flex;gap:6px;margin-left:4px}
.pickbar .mini img{width:34px;height:30px;object-fit:contain;mix-blend-mode:multiply;background:var(--soft);border-radius:7px;border:1px solid var(--line)}
.pickbar .go{margin-left:auto;background:var(--lime);color:var(--limeink);font-weight:700;font-size:14px;padding:14px 22px;border-radius:30px;cursor:pointer;border:none;display:inline-flex;gap:8px;align-items:center}
.pickbar .go.dim{background:var(--soft2);color:#9a9a9a;cursor:default}
/* adrian modal */
.modal{position:fixed;inset:0;z-index:100;background:#0c0c0ecc;display:none;align-items:flex-end;justify-content:center}
.modal.show{display:flex}
.sheet{background:#fff;width:100%;max-width:560px;border-radius:24px 24px 0 0;padding:26px 24px calc(26px + env(safe-area-inset-bottom));max-height:92vh;overflow:auto}
@media(min-width:620px){.modal{align-items:center}.sheet{border-radius:24px}}
.sheet .ahead{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.sheet .ai{width:42px;height:42px;border-radius:50%;background:var(--ink);color:var(--lime);display:grid;place-items:center;font-family:var(--disp);font-size:20px}
.sheet h3{font-family:var(--disp);font-weight:400;font-size:24px;text-transform:uppercase;line-height:1}
.sheet .q{font-size:16px;font-weight:600;margin:18px 0 12px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{border:1px solid var(--line);background:#fff;border-radius:16px;padding:16px;text-align:left;cursor:pointer;font-family:inherit;transition:.12s}
.opt:hover{border-color:var(--ink)}
.opt b{display:block;font-size:15px;font-weight:700}
.opt span{font-size:12px;color:var(--muted)}
.opt.on{border-color:var(--lime);background:#fbffe8}
.sheet .step{font-size:12px;color:#9a9a9a;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.sheet .x{position:absolute;top:14px;right:16px;font-size:20px;cursor:pointer;color:#999}
.adresult{text-align:center;padding:8px 0}
.adresult .rimgs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:14px 0}
.adresult .rimgs img{width:60px;height:50px;object-fit:contain;mix-blend-mode:multiply;background:var(--soft);border-radius:8px;border:1px solid var(--line)}
.bigbtn{width:100%;background:var(--lime);color:var(--limeink);border:none;font-weight:700;font-size:15px;padding:16px;border-radius:30px;cursor:pointer;margin-top:8px}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-weight:600;font-size:13px;padding:12px 18px;border-radius:30px;opacity:0;transition:.25s;pointer-events:none;z-index:120}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style></head><body>

<header class="nav"><div class="wrap row">
  <a class="brand" href="index.html">PARASITE<span class="dot">·</span>CLUB<span class="dot">·</span>USA</a>
  <div style="display:flex;gap:14px;align-items:center">
    <a href="bag.html" style="font-weight:600;font-size:14px">Bag<span id="bagcount" style="display:none;background:var(--ink);color:#fff;border-radius:20px;font-size:11px;padding:1px 7px;margin-left:4px;font-weight:700"></span></a>
    <a class="navbtn" href="tryon3d.html">Try on <span class="bagct" id="bagn" style="display:none"></span></a>
  </div>
</div></header>

<div class="wrap">
  <div class="houses" id="houses"></div>
  <div class="bhead">
    <div><h1 id="hname">Portrait</h1><div class="meta" id="hmeta"></div></div>
    <button class="adbtn" id="adbtn">✦ Help me choose</button>
  </div>
  <div class="filters">
    <div class="cols" id="cols"></div>
    <div class="seg" id="typeseg">
      <button data-t="all" class="on">All</button>
      <button data-t="Eyeglasses">Optical</button>
      <button data-t="Sunglasses">Sun</button>
    </div>
  </div>
  <div class="colinfo" id="colinfo"></div>

  <div class="stage">
    <button class="arw prev" id="prev">‹</button>
    <div class="card" id="card"></div>
    <button class="arw next" id="next">›</button>
  </div>
  <div class="counter" id="counter"></div>
  <div class="prog"><i id="progbar"></i></div>
  <div class="swatchrow" id="swatchrow"></div>
</div>

<div class="pickbar"><div class="wrap row">
  <div class="pickpanel" id="pickpanel"></div>
  <div class="lbl" id="picklbl" style="cursor:pointer"><b id="pickn">0</b> saved <span id="pickcar" style="opacity:.45;font-size:11px">▴ manage</span></div>
  <div class="mini" id="pickmini"></div>
  <button class="go dim" id="tryon">Try them on →</button>
</div></div>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
const Q=new URLSearchParams(location.search);
function toast(t){const e=$('toast');e.textContent=t;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),1900);}
(function(){try{const bag=JSON.parse(localStorage.getItem('upc_bag')||'[]');const n=bag.reduce((s,b)=>s+(b.q||1),0);const el=$('bagcount');if(n&&el){el.textContent=n;el.style.display='inline-block';}}catch(e){}})();
const getFavs=()=>{try{return JSON.parse(localStorage.getItem('upc_favs')||'[]')}catch(e){return[]}};
const setFavs=a=>{localStorage.setItem('upc_favs',JSON.stringify(a));};
const stripNum=s=>(s||'').replace(/\s*\d+\s*$/,'').trim();
const modelKey=p=>p.b+'|'+(stripNum(p.model||p.n)||(p.model||p.n)).toUpperCase();
const displayModel=p=>stripNum(p.model||p.n)||(p.model||p.n);
const colorName=p=>{const b=displayModel(p);let c=(p.n||'').trim();if(c.toUpperCase().startsWith(b.toUpperCase()))c=c.slice(b.length).trim();return c||(p.n||'');};
/* ---- image normalizer: pick whitest-bg frame shot, crop to the frame, cache ---- */
const _imgCache={};
function loadImg(u){return new Promise((res,rej)=>{const im=new Image();im.crossOrigin='anonymous';im.onload=()=>res(im);im.onerror=rej;im.src=u+'?width=600';});}
function cornerW(a,w,h){const pts=[[2,2],[w-3,2],[2,h-3],[w-3,h-3]];let s=0;pts.forEach(([x,y])=>{const i=(y*w+x)*4;s+=(a[i]+a[i+1]+a[i+2])/3;});return s/4;}
/* Is this a flat, straight-on FRONT shot? (symmetric silhouette + frame-shaped aspect) */
function frontEval(a,w,h){
  let minx=w,miny=h,maxx=0,maxy=0;
  for(let y=0;y<h;y+=2)for(let px=0;px<w;px+=2){const i=(y*w+px)*4;if(a[i]>232&&a[i+1]>232&&a[i+2]>232)continue;if(px<minx)minx=px;if(px>maxx)maxx=px;if(y<miny)miny=y;if(y>maxy)maxy=y;}
  const bw=maxx-minx,bh=maxy-miny;if(bw<8||bh<6)return{ok:false};
  const GW=32,GH=24;let match=0,tot=0;
  const m=(gx,gy)=>{const sx=Math.round(minx+bw*gx/(GW-1)),sy=Math.round(miny+bh*gy/(GH-1));const i=(sy*w+sx)*4;return (a[i]>232&&a[i+1]>232&&a[i+2]>232)?0:1;};
  for(let gy=0;gy<GH;gy++)for(let gx=0;gx<GW;gx++){tot++;if(m(gx,gy)===m(GW-1-gx,gy))match++;}
  const sym=match/tot,asp=bw/bh;
  return{ok:true,front:(sym>=0.86&&asp>=2.2&&asp<=4.3),sym,asp,minx,miny,bw,bh};
}
/* pick the best straight-on white-bg shot; null if the model has none */
async function chooseFront(p){
  const cands=(p.imgs&&p.imgs.length?p.imgs:[p.img]).slice(0,5);
  let best=null,bestSym=-1;
  for(const u of cands){try{const im=await loadImg(u);const c=document.createElement('canvas');c.width=im.naturalWidth;c.height=im.naturalHeight;
    const x=c.getContext('2d');x.drawImage(im,0,0);const a=x.getImageData(0,0,c.width,c.height).data;
    const white=cornerW(a,c.width,c.height),ev=frontEval(a,c.width,c.height);
    if(ev.ok&&ev.front&&white>=215&&ev.sym>bestSym){bestSym=ev.sym;best={c,ev};}
  }catch(e){}}
  return best;
}
async function normalizedFrame(p){
  if(_imgCache[p.h]!==undefined)return _imgCache[p.h];
  const b=await chooseFront(p);
  if(!b){_imgCache[p.h]=null;return null;}            // no straight-on photo → show none
  let {minx,miny,bw,bh}=b.ev;const padX=bw*0.10,padY=bh*0.18;
  minx=Math.max(0,minx-padX);miny=Math.max(0,miny-padY);bw=Math.min(b.c.width-minx,bw+padX*2);bh=Math.min(b.c.height-miny,bh+padY*2);
  const o=document.createElement('canvas');o.width=Math.round(bw);o.height=Math.round(bh);
  o.getContext('2d').drawImage(b.c,minx,miny,bw,bh,0,0,o.width,o.height);
  const url=o.toDataURL('image/png');_imgCache[p.h]=url;return url;
}

const HMETA={Portrait:'Premium · Handmade in Italy',Acid:'Designer · France · by Hugo Martin',Parasite:'Futurist · France · handcrafted'};
const COLS={
  Portrait:[['all','All'],['essential','Essential'],['editorial','Editorial'],['metal','Metal']],
  Acid:[['all','All'],['acetate','Acetate'],['metal','Metal'],['boost','Boost'],['premium','Premium']],
  Parasite:[['all','All'],['signature','Icons'],['lab','Lab']],
};
const COLINFO={
  all:'The full house — every style, optical and sun.',
  essential:'Everyday icons — clean, wearable shapes you reach for daily.',
  editorial:'Statement frames with character and a point of view.',
  metal:'Lightweight metal constructions — minimal and refined.',
  acetate:'Sculpted acetate — rich color and hand-finished texture.',
  boost:'Bolder, brighter — Acid turned up.',
  premium:'The elevated tier — premium materials and detailing.',
  signature:'Parasite icons — the avant-garde shapes the house is known for.',
  lab:'The experimental Lab line — Parasite at its most futurist.',
};
function matchCol(p,k){
  if(k==='all')return true;
  if(k==='signature')return !(p.cols&&p.cols.length);
  return p.cols&&p.cols.includes(k);
}

let DATA=[],house=Q.get('b')||'Portrait',col='all',type='all',list=[],i=0,cur=null;
if(!['Portrait','Acid','Parasite'].includes(house))house='Portrait';

fetch('products.json').then(r=>r.json()).then(d=>{
  DATA=d;buildHouses();buildCols();refresh();renderPick();
  if(Q.get('adrian')==='1')openAdrian();
});

function buildHouses(){
  $('houses').innerHTML=['Portrait','Acid','Parasite'].map(h=>`<button class="hpill${h===house?' on':''}" data-h="${h}">${h}</button>`).join('');
  $('houses').querySelectorAll('.hpill').forEach(b=>b.onclick=()=>{house=b.dataset.h;col='all';buildHouses();buildCols();refresh();});
  $('hname').textContent=house;$('hmeta').textContent=HMETA[house];
}
function buildCols(){
  $('cols').innerHTML=COLS[house].map(c=>`<button class="chip${c[0]===col?' on':''}" data-c="${c[0]}">${c[1]}</button>`).join('');
  $('cols').querySelectorAll('.chip').forEach(b=>b.onclick=()=>{col=b.dataset.c;buildCols();refresh();});
}
$('typeseg').querySelectorAll('button').forEach(b=>b.onclick=()=>{
  type=b.dataset.t;$('typeseg').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));refresh();
});
function buildList(){
  let l=DATA.filter(p=>p.b===house&&matchCol(p,col)&&(type==='all'||p.t===type));
  const seen=new Set(),out=[];
  l.forEach(p=>{const k=modelKey(p);if(!seen.has(k)){seen.add(k);out.push(p);}});
  return out;
}
function colorways(p){return DATA.filter(x=>modelKey(x)===modelKey(p));}
function refresh(){
  list=buildList();i=0;$('colinfo').textContent=COLINFO[col]||'';
  if(!list.length){$('card').innerHTML='<div style="padding:40px;text-align:center;color:#9a9a9a">No frames in this filter yet.</div>';$('counter').textContent='';$('progbar').style.width='0';$('swatchrow').innerHTML='';return;}
  show();
}
function show(){
  cur=list[i];const fav=getFavs().includes(cur.h);
  const fin=(cur.p/4).toFixed(2);
  const cw=colorways(cur),cwIdx=cw.findIndex(x=>x.h===cur.h),cwN=cw.length,cname=colorName(cur);
  $('card').innerHTML=`
    ${cur.new?'<span class="new">New</span>':''}
    <button class="heart${fav?' on':''}" id="heart">${fav?'♥':'♡'}</button>
    <div class="imgwrap"><img id="cardimg" alt="${cur.n}" style="display:none"><div class="noimg" id="noimg">Finding a straight-on photo…</div></div>
    <div class="cinfo">
      <div><div class="col">${house}${col!=='all'?' · '+(COLS[house].find(c=>c[0]===col)||[])[1]:''}</div>
        <h2>${displayModel(cur)}</h2><div class="sub">${cwN>1?`<b style="color:#0c0c0e">Color:</b> ${cname} <span style="opacity:.6">· ${cwIdx+1} of ${cwN}</span>`:cname} · ${cur.t==='Sunglasses'?'Sunglasses':'Optical'}</div></div>
      <div class="price"><div class="pv">$${cur.p}</div><div class="fin">or 4× $${fin} · Shop Pay</div></div>
    </div>
    <div class="cactions">
      <button class="save${fav?' on':''}" id="save">${fav?'♥ Saved':'♡ Save to picks'}</button>
      <button class="try" id="trythis">Try this on</button>
    </div>`;
  $('heart').onclick=$('save').onclick=toggleFav;
  $('trythis').onclick=()=>{ if(!getFavs().includes(cur.h))doFav(cur.h,true); location.href='tryon3d.html?h='+encodeURIComponent(cur.h); };
  // colorways
  const cw=colorways(cur);
  $('swatchrow').innerHTML=cw.length>1?cw.slice(0,8).map(c=>`<div class="swatch${c.h===cur.h?' on':''}" data-h="${c.h}"><img src="${c.img}?width=90"></div>`).join(''):'';
  $('swatchrow').querySelectorAll('.swatch').forEach(s=>s.onclick=()=>{cur=DATA.find(p=>p.h===s.dataset.h);list[i]=cur;show();});
  $('counter').innerHTML=`<b>${i+1}</b> / ${list.length} · ${list.length} styles`;
  $('progbar').style.width=((i+1)/list.length*100)+'%';
  const want=cur.h;normalizedFrame(cur).then(u=>{if(!(cur&&cur.h===want))return;const im=$('cardimg'),ni=$('noimg');if(u){im.src=u;im.style.display='';if(ni)ni.style.display='none';}else{im.style.display='none';if(ni){ni.textContent='No straight-on photo yet';ni.style.display='';}}}).catch(()=>{});
}
function toggleFav(){doFav(cur.h,!getFavs().includes(cur.h));show();renderPick();}
function doFav(h,on){let f=getFavs();if(on){if(!f.includes(h))f.push(h);toast('Saved to your picks ♥');}else{f=f.filter(x=>x!==h);}setFavs(f);}
$('prev').onclick=()=>{if(!list.length)return;i=(i-1+list.length)%list.length;show();};
$('next').onclick=()=>{if(!list.length)return;i=(i+1)%list.length;show();};
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')$('prev').click();if(e.key==='ArrowRight')$('next').click();});
// swipe
let sx=null;$('card').addEventListener('pointerdown',e=>sx=e.clientX);
window.addEventListener('pointerup',e=>{if(sx==null)return;const dx=e.clientX-sx;if(Math.abs(dx)>50){dx<0?$('next').click():$('prev').click();}sx=null;});

function renderPick(){
  const f=getFavs();$('pickn').textContent=f.length;
  $('bagn').style.display=f.length?'inline-block':'none';$('bagn').textContent=f.length;
  const mini=f.slice(-5).map(h=>{const p=DATA.find(x=>x.h===h);return p?`<img src="${p.img}?width=80">`:'';}).join('');
  $('pickmini').innerHTML=mini;
  $('pickcar').style.display=f.length?'inline':'none';
  const go=$('tryon');
  if(f.length){go.classList.remove('dim');go.textContent='Try '+f.length+' on →';go.onclick=()=>location.href='tryon3d.html?picks=1';}
  else{go.classList.add('dim');go.textContent='Heart some first';go.onclick=()=>toast('Tap the heart on frames you like');$('pickpanel').classList.remove('show');}
  // build manage panel
  const pp=$('pickpanel');
  if(f.length){pp.innerHTML='<div class="ph">Your picks — tap remove to delete</div>'+f.map(h=>{const p=DATA.find(x=>x.h===h);if(!p)return '';return `<div class="prow"><img src="${p.img}?width=110"><div class="pn">${displayModel(p)}<small>${p.n} · $${p.p}</small></div><button class="rm" data-h="${h}">Remove ✕</button></div>`;}).join('');
    pp.querySelectorAll('.rm').forEach(b=>b.onclick=()=>{doFav(b.dataset.h,false);toast('Removed from picks');renderPick();if(cur)show();});}
}
$('picklbl').onclick=()=>{if(getFavs().length)$('pickpanel').classList.toggle('show');};

/* ---------- Adrian quiz ---------- */
const QUIZ=[
  {k:'type',q:'What are you after?',o:[['Eyeglasses','Optical','Prescription / clear lenses'],['Sunglasses','Sun','Tinted / UV'],['all','Both','Show me everything']]},
  {k:'vibe',q:'Your vibe?',o:[['understated','Understated','Clean & everyday'],['statement','Statement','Bold, noticed'],['avant','Avant-garde','Sculptural & futurist']]},
  {k:'face',q:'Your face shape?',o:[['round','Round','Softer, fuller'],['square','Square','Strong jaw / angular'],['oval','Oval / long','Balanced, longer'],['unsure','Not sure','Surprise me']]},
  {k:'house',q:'A house in mind?',o:[['any','Any house','Best across all three'],['Portrait','Portrait','Italian premium'],['Acid','Acid','French design'],['Parasite','Parasite','Futurist']]},
];
let ans={},qi=0;
function openAdrian(){qi=0;ans={};$('modal').classList.add('show');renderQuiz();}
function closeAdrian(){$('modal').classList.remove('show');}
function renderQuiz(){
  const s=QUIZ[qi];
  $('sheet').innerHTML=`
    <div class="x" id="ax">✕</div>
    <div class="ahead"><div class="ai">A</div><div><div class="step">Adrian · ${qi+1} of ${QUIZ.length}</div><h3>Let's find your pair</h3></div></div>
    <div class="q">${s.q}</div>
    <div class="opts">${s.o.map(o=>`<button class="opt" data-v="${o[0]}"><b>${o[1]}</b><span>${o[2]}</span></button>`).join('')}</div>`;
  $('ax').onclick=closeAdrian;
  $('sheet').querySelectorAll('.opt').forEach(b=>b.onclick=()=>{ans[s.k]=b.dataset.v;qi++;qi<QUIZ.length?renderQuiz():finishQuiz();});
}
const VIBECOLS={understated:['essential','acetate','signature'],statement:['editorial','boost'],avant:['lab','premium','metal']};
function finishQuiz(){
  let pool=DATA.slice();
  if(ans.house&&ans.house!=='any')pool=pool.filter(p=>p.b===ans.house);
  if(ans.type&&ans.type!=='all')pool=pool.filter(p=>p.t===ans.type);
  const vc=VIBECOLS[ans.vibe]||[];
  let matched=pool.filter(p=>vc.some(k=>matchCol(p,k)));
  if(matched.length<5)matched=pool;                          // fallback: don't return empty
  // dedupe by model, shuffle, take 6
  const seen=new Set(),uniq=[];
  matched.sort(()=>Math.random()-0.5).forEach(p=>{const k=modelKey(p);if(!seen.has(k)){seen.add(k);uniq.push(p);}});
  const pick=uniq.slice(0,6);
  let f=getFavs();pick.forEach(p=>{if(!f.includes(p.h))f.push(p.h);});setFavs(f);
  renderPick();
  $('sheet').innerHTML=`
    <div class="x" id="ax">✕</div>
    <div class="ahead"><div class="ai">A</div><div><div class="step">Adrian</div><h3>Your shortlist</h3></div></div>
    <div class="adresult">
      <p style="font-size:14px;color:var(--muted)">Based on your answers I saved <b style="color:var(--ink)">${pick.length}</b> frames to your picks. Let's see them on you.</p>
      <div class="rimgs">${pick.map(p=>`<img src="${p.img}?width=120" title="${p.n}">`).join('')}</div>
      <button class="bigbtn" id="trythem">Try my ${pick.length} picks on →</button>
      <button class="bigbtn" id="browsethem" style="background:#fff;border:1px solid var(--line);color:var(--ink)">Browse them first</button>
    </div>`;
  $('ax').onclick=closeAdrian;
  $('trythem').onclick=()=>location.href='tryon3d.html?picks=1';
  $('browsethem').onclick=()=>{closeAdrian();if(ans.house&&ans.house!=='any'){house=ans.house;}col='all';if(ans.type)type=ans.type;buildHouses();buildCols();$('typeseg').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x.dataset.t===type));refresh();toast('Hearted frames are in your picks ♥');};
}
$('adbtn').onclick=openAdrian;
$('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeAdrian();});
</script>
