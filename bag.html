<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Your Bag — Parasite Club USA</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#fff;--ink:#0c0c0e;--soft:#f5f4ef;--soft2:#eceae3;--muted:#6c6c74;--line:#e7e5dd;--lime:#C2F500;--limeink:#1d2400;--heart:#ff3b6b;--sans:'Inter',system-ui,sans-serif;--disp:'Anton',sans-serif;--wrap:1080px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:40px}
a{color:inherit;text-decoration:none}img{display:block;max-width:100%}
.wrap{max-width:var(--wrap);margin:0 auto;padding:0 22px}
.nav{position:sticky;top:0;z-index:50;background:#ffffffe8;backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.nav .row{display:flex;align-items:center;justify-content:space-between;height:60px}
.brand{font-family:var(--disp);font-size:18px}.brand .dot{color:#9a9a9a}
.nav .links{display:flex;gap:20px;font-size:14px;font-weight:500}
.nav .links a{color:#333}
h1.title{font-family:var(--disp);font-weight:400;font-size:clamp(28px,5vw,42px);text-transform:uppercase;margin:30px 0 22px}
.layout{display:grid;grid-template-columns:1fr 360px;gap:26px;align-items:start}
@media(max-width:820px){.layout{grid-template-columns:1fr}}
/* items */
.item{display:flex;gap:16px;padding:18px 0;border-top:1px solid var(--line)}
.item .pic{width:130px;height:96px;flex:none;background:var(--soft);border-radius:14px;display:grid;place-items:center;overflow:hidden}
.item .pic img{max-width:88%;max-height:84%;object-fit:contain;mix-blend-mode:multiply}
.item .pic .np{font-size:10px;color:#a8a6a0;text-align:center;padding:6px}
.item .info{flex:1;min-width:0}
.item .nm{font-weight:700;font-size:16px}
.item .sub{font-size:12.5px;color:var(--muted);margin-top:2px}
.item .availed{font-size:12px;color:#1a7a3a;margin-top:8px;background:#f0faef;border:1px solid #d7eed3;display:inline-block;padding:5px 10px;border-radius:8px}
.item .ctrls{display:flex;align-items:center;gap:14px;margin-top:12px}
.qty{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:30px;overflow:hidden}
.qty button{border:none;background:#fff;width:34px;height:34px;font-size:16px;cursor:pointer;font-family:inherit}
.qty span{min-width:30px;text-align:center;font-weight:700;font-size:14px}
.rmv{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;text-decoration:underline}
.item .price{font-family:var(--disp);font-size:20px;flex:none;text-align:right}
.empty{border:1px dashed var(--line);border-radius:18px;padding:50px 30px;text-align:center;color:var(--muted)}
.empty a{color:var(--ink);font-weight:700;text-decoration:underline}
/* summary */
.summary{border:1px solid var(--line);border-radius:18px;padding:22px;position:sticky;top:80px;background:#fff}
.summary h2{font-size:18px;font-weight:800;margin-bottom:14px}
.srow{display:flex;justify-content:space-between;font-size:14px;padding:7px 0;color:#333}
.srow.total{border-top:1px solid var(--line);margin-top:6px;padding-top:14px;font-size:17px;font-weight:800}
.srow .mut{color:var(--muted);font-size:12.5px}
.pay{background:var(--soft);border-radius:14px;padding:14px;margin:16px 0;font-size:12.5px;color:#444}
.pay b{color:var(--ink)}
.pay .shop{color:#5a31f4;font-weight:700}
.checkout{width:100%;background:var(--lime);color:var(--limeink);border:none;font-weight:800;font-size:15px;padding:17px;border-radius:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.checkout:active{transform:scale(.99)}
.checkout.dim{background:var(--soft2);color:#9a9a9a;cursor:default}
.trust{display:flex;justify-content:center;gap:18px;margin-top:14px;font-size:11.5px;color:var(--muted);flex-wrap:wrap}
.alt{text-align:center;margin-top:16px;font-size:13px}
.alt a{font-weight:700;text-decoration:underline}
.secure{font-size:11px;color:#9a9a9a;text-align:center;margin-top:10px}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(16px);background:var(--ink);color:#fff;font-weight:600;font-size:13px;padding:12px 18px;border-radius:30px;opacity:0;transition:.25s;pointer-events:none;z-index:90}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style></head><body>

<header class="nav"><div class="wrap row">
  <a class="brand" href="index.html">PARASITE<span class="dot">·</span>CLUB<span class="dot">·</span>USA</a>
  <div class="links">
    <a href="browse.html?b=Portrait">Keep shopping</a>
    <a href="tryon3d.html">Try-on</a>
  </div>
</div></header>

<main class="wrap">
  <h1 class="title" id="title">Your bag</h1>
  <div class="layout">
    <div id="items"></div>
    <aside class="summary" id="summary"></aside>
  </div>
</main>
<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
const CART=hs=>'/api/shopify?action=cart&handles='+encodeURIComponent(hs);
function toast(t){const e=$('toast');e.textContent=t;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),1900);}
const stripNum=s=>(s||'').replace(/\s*\d+\s*$/,'').trim();
const displayModel=p=>stripNum(p.model||p.n)||(p.model||p.n);
const getBag=()=>{try{return JSON.parse(localStorage.getItem('upc_bag')||'[]')}catch(e){return[]}};
const setBag=a=>localStorage.setItem('upc_bag',JSON.stringify(a));

/* front-photo picker (same logic as the rest of the site) */
const _ic={};
const loadImg=u=>new Promise((res,rej)=>{const im=new Image();im.crossOrigin='anonymous';im.onload=()=>res(im);im.onerror=rej;im.src=u+'?width=500';});
function cornerW(a,w,h){const pts=[[2,2],[w-3,2],[2,h-3],[w-3,h-3]];let s=0;pts.forEach(([x,y])=>{const i=(y*w+x)*4;s+=(a[i]+a[i+1]+a[i+2])/3;});return s/4;}
function frontEval(a,w,h){let minx=w,miny=h,maxx=0,maxy=0;for(let y=0;y<h;y+=2)for(let px=0;px<w;px+=2){const i=(y*w+px)*4;if(a[i]>232&&a[i+1]>232&&a[i+2]>232)continue;if(px<minx)minx=px;if(px>maxx)maxx=px;if(y<miny)miny=y;if(y>maxy)maxy=y;}const bw=maxx-minx,bh=maxy-miny;if(bw<8||bh<6)return{ok:false};const GW=28,GH=20;let mt=0,tt=0;const m=(gx,gy)=>{const sx=Math.round(minx+bw*gx/(GW-1)),sy=Math.round(miny+bh*gy/(GH-1));const i=(sy*w+sx)*4;return (a[i]>232&&a[i+1]>232&&a[i+2]>232)?0:1;};for(let gy=0;gy<GH;gy++)for(let gx=0;gx<GW;gx++){tt++;if(m(gx,gy)===m(GW-1-gx,gy))mt++;}return{ok:true,front:(mt/tt>=0.86&&bw/bh>=2.2&&bw/bh<=4.3),minx,miny,bw,bh};}
async function frontURL(p){
  if(_ic[p.h]!==undefined)return _ic[p.h];
  const cands=(p.imgs&&p.imgs.length?p.imgs:[p.img]).slice(0,4);let best=null;
  for(const u of cands){try{const im=await loadImg(u);const c=document.createElement('canvas');c.width=im.naturalWidth;c.height=im.naturalHeight;const x=c.getContext('2d');x.drawImage(im,0,0);const a=x.getImageData(0,0,c.width,c.height).data;if(cornerW(a,c.width,c.height)<215)continue;const ev=frontEval(a,c.width,c.height);if(ev.ok&&ev.front){best={c,ev};break;}}catch(e){}}
  if(!best){_ic[p.h]=null;return null;}
  let {minx,miny,bw,bh}=best.ev;const px=bw*0.08,py=bh*0.14;minx=Math.max(0,minx-px);miny=Math.max(0,miny-py);bw=Math.min(best.c.width-minx,bw+px*2);bh=Math.min(best.c.height-miny,bh+py*2);
  const o=document.createElement('canvas');o.width=Math.round(bw);o.height=Math.round(bh);o.getContext('2d').drawImage(best.c,minx,miny,bw,bh,0,0,o.width,o.height);
  const url=o.toDataURL('image/png');_ic[p.h]=url;return url;
}

let DATA=[];
fetch('products.json').then(r=>r.json()).then(d=>{DATA=d;render();});
function bagItems(){return getBag().map(b=>{const p=DATA.find(x=>x.h===b.h);return p?{p,q:b.q||1}:null;}).filter(Boolean);}
function render(){
  const items=bagItems();
  const n=items.reduce((s,it)=>s+it.q,0);
  $('title').textContent=n?`${n} item${n>1?'s':''} in your bag`:'Your bag';
  if(!items.length){
    $('items').innerHTML=`<div class="empty">Your bag is empty.<br><br><a href="browse.html?b=Portrait">Browse the houses</a> or <a href="tryon3d.html">open the try-on</a> to add frames.</div>`;
    $('summary').innerHTML='';return;
  }
  $('items').innerHTML=items.map(({p,q})=>`
    <div class="item" data-h="${p.h}">
      <div class="pic"><img id="img_${p.h}" alt="${p.n}" style="display:none"><span class="np" id="np_${p.h}">…</span></div>
      <div class="info">
        <div class="nm">${displayModel(p)}</div>
        <div class="sub">${p.b} · ${p.n} · ${p.t==='Sunglasses'?'Sunglasses':'Optical frame'}</div>
        <div class="availed">Ships free · authenticity guaranteed</div>
        <div class="ctrls">
          <div class="qty"><button data-dec="${p.h}">–</button><span>${q}</span><button data-inc="${p.h}">+</button></div>
          <button class="rmv" data-rm="${p.h}">Remove</button>
        </div>
      </div>
      <div class="price">$${p.p*q}</div>
    </div>`).join('');
  // images
  items.forEach(({p})=>frontURL(p).then(u=>{const im=$('img_'+p.h),np=$('np_'+p.h);if(u){im.src=u;im.style.display='';if(np)np.style.display='none';}else if(np){np.textContent='No front photo';}}).catch(()=>{}));
  // controls
  $('items').querySelectorAll('[data-inc]').forEach(b=>b.onclick=()=>chg(b.dataset.inc,1));
  $('items').querySelectorAll('[data-dec]').forEach(b=>b.onclick=()=>chg(b.dataset.dec,-1));
  $('items').querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{setBag(getBag().filter(x=>x.h!==b.dataset.rm));render();toast('Removed');});
  // summary
  const sub=items.reduce((s,it)=>s+it.p.p*it.q,0);
  const mo=(sub/12).toFixed(2);
  $('summary').innerHTML=`
    <h2>Order summary</h2>
    <div class="srow"><span>Subtotal</span><span>$${sub.toFixed(2)}</span></div>
    <div class="srow"><span>Shipping</span><span>Free</span></div>
    <div class="srow"><span>Taxes</span><span class="mut">Calculated at checkout</span></div>
    <div class="srow total"><span>Total</span><span>$${sub.toFixed(2)}</span></div>
    <div class="pay">Pay in full, or pay monthly from <b>$${mo}/mo</b> with <span class="shop">shop</span> Pay — as low as 0% APR over 6, 12 or 24 months.</div>
    <button class="checkout" id="checkout">Checkout · $${sub.toFixed(2)}</button>
    <div class="trust"><span>🚚 Free delivery</span><span>↩ Free returns</span><span>✓ Authentic</span></div>
    <div class="alt">Not sure yet? <a href="trunk.html">Try them at home, free →</a></div>
    <div class="secure">🔒 Secure checkout powered by Shopify · Shop Pay</div>`;
  $('checkout').onclick=()=>{
    const hs=items.map(it=>it.p.h+':'+it.q).join(',');
    toast('Opening secure checkout…');
    try{window.MK&&MK.track('InitiateCheckout',{value:sub,num_items:n});}catch(e){}
    location.href=CART(hs);
  };
}
function chg(h,d){const bag=getBag();const it=bag.find(x=>x.h===h);if(!it)return;it.q=Math.max(1,Math.min(9,(it.q||1)+d));setBag(bag);render();}
</script>
<script src="/mk.js"></script>
</body></html>
